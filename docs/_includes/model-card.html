{%- assign wrap = include.wrap | default: 'true' -%}
{%- if wrap != 'false' -%}
<div class="t2-card">
{%- endif -%}
  {% if include.title %}
    <h2>{{ include.title }}</h2>
  {% endif %}

  <div class="t2-model-stage">
    <model-viewer
      id="t2ModelViewer-{{ include.id | default: include.file | slugify }}"
      class="t2-model-viewer"
      src="{{ include.file | relative_url }}"
      {% if include.poster %}poster="{{ include.poster | relative_url }}"{% endif %}
      alt="{{ include.alt | default: include.title | default: '3D model' }}"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1.1"
      exposure="0.9"
      environment-image="neutral"
      interaction-prompt="none"
      loading="lazy"
      reveal="auto">
    </model-viewer>
  </div>

  {% if include.caption %}
    <div class="t2-sub t2-model-caption">{{ include.caption }}</div>
  {% endif %}
{%- if wrap != 'false' -%}
</div>
{%- endif -%}
