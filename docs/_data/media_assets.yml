simulation_media:
  title: Simulation and gait verification
  items:
  - type: animation
    path: /assets/software/mujoco_first_linkage_test.webm
    title: First MuJoCo linkage test
    caption: Single-linkage simulation used to check joint hierarchy, contact behavior, and basic crank-driven Klann
      motion before scaling the model to the full hexapod.
    pending: false
  - type: animation
    path: /assets/software/mujoco_all_linkages_running.webm
    title: All linkages running in MuJoCo
    caption: Full six-linkage simulation exercising the phase relationships and commanded crank motion used to validate
      the base walking mechanism before hardware integration.
    pending: false
  - type: animation
    path: /assets/software/mujoco_support_wheel_test.webm
    title: Support wheel stability test
    caption: Simulation pass used to evaluate auxiliary support strategy and body stability while the six Klann
      mechanisms produce forward motion.
    pending: false
  - type: image
    path: /assets/software/mujoco_torque_estimation_graph.jpg
    title: MuJoCo torque estimation
    caption: Torque-estimation plot from simulation used to compare expected actuator demand against the selected
      motor/gearbox envelope.
    pending: false
  - type: image
    path: /assets/software/mujoco_powerdraw_estimation_graph.jpg
    title: MuJoCo power-draw estimation
    caption: Power-draw estimation plot used to reason about electrical loading, battery sizing, and conservative
      runtime limits before full physical testing.
    pending: false
